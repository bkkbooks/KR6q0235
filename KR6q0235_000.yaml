front:
  text: 自序鉼鐶叉釧一金而別其器酥酪醍醐一乳而異其名自其殊者視之肝膽楚越也自其同者視之靈蠢冰水也矧般若之摩訶衍而繫辭則曰大衍中庸之無聲臭而道德則曰至虛乃至三心不可得與絶四與無為的的然一鼎三足庸詎以彼此觀耶豫自脫其古槐長夜復入如幻三昧中目擊藏海之漚已具烏曇之華界足履毛孔之步猶過摩詰之陶輪恍乘莽渺鳥而出六極莫知其然而然也反而執之於左契始知性天即一中之旨釋氏而歸之老氏而守之孔氏而貫之特教化若徂公賦芧耳第乍入吾道者只知一之所已闢而不知一之所未闢故臨內外境典如失寶印而不達斯必參其別傳之眼藏俾於多羅了義若推門落白也不然則三聖人乏所說果將為隱躄人者耶果將為踶跂人者耶惟不蘊堅白異同之士懇垂隻眼庶幾得金忘專得乳忘名便可語夫象先矣吹萬廣真說一貫別傳小引三教聖賢總從一箇圈子裡透出性公人又說出如許注腳將無屋上架屋道人曰不然假如要到長安避不得梯彰義門瞻仰聖人宮闕後復有人問路亦須覶縷向說這老和尚不肯只做自了漢兒他也東行西走費卻許多腳跟如今坐在聚雲方丈正好瞑目趺跏那管他千山萬水也將從前經歷路程舉似後來行腳會得的到了長安更莫問他在齊魯之西趙魏之比道人有一偈豫萬水千山在腳跟放下草鞋全沒帳進門好圖一覺睡且莫想到路途上敢以質之性公戒庵道人馬易從題於齊之拙暇園一貫別傳目録卷之一儒宗伏羲八卦原伏羲六十四封原乾道變化利貞復其見心乎艮其皆其人故神無方無體百姓日用鮮矣上無喝斥大學之道章天命全章君子素其得為鬼神之為德可遺至誠致曲二章豫懷明德一節上回學處六十而耳踰矩君子不器君子無終於是朝聞道夕死可矣君子之於與比一貫章宰豫晝寢何誅夫子之文章回也不改其樂誰能出不道也知之者之者飯疏食章二三了丘也仁遠乎哉至矣子絶四章吾有知乎哉章喟然章可與共學章未知生焉知死顏淵問仁章當仁不讓於師豫欲無言章上俱論部敢問夫子四節乍見孺子一節顏淵曰若是象日以殺舜為事殃壽不二命也上俱孟子卷之二玄宗道可道章天下皆知章不尚賢吾不知其之先天地不仁谷神不死聖人後其身身存上善若水故有之為用是以聖人為目致虛極其復有物混成曰道是以聖人棄物昔之得一以寧不笑不足以為道道生一為和躁勝寒下正為學日益為矣為無為無味知不知上知病上俱道德經何不樹之之野吾喪我庖丁為文解牛心齊坐忘壺子玄珠濠梁之上墜車道術上俱南華經聖人之權為道是以聖人去識夫忘精神之矣惟聖人能神於神聖人御物可拘物不知我我不知物上俱文始經卷之三釋宗般若心經金剛大義須菩提應住節九種衆生若心取法壽者我念過去過者五眼上俱金剛經若一日不亂一切諸佛念經上俱彌勒經問沙門四十二章經診脈說維摩接妙喜國土不二法門上俱維摩經總說所謂殺父母身血宗通說通上俱楞伽經總說文殊章知是空華輪轉知幻即離漸次菩薩唯以世間隨順覺性二十五輪修於禪那數門上俱圓覺經卷之四總說摩阿難頂一節七處徵心憍陳那悟客塵章八還辨見文殊請問章識陰同是菩提瞪發勞相富樓那章演若達多迷頭認影浮根四塵等句觀音三十二應十四無畏八萬四千首臂寶目文殊選擇楞嚴咒衆生十二種類三漸次十信五十五位想舉情沉十習因六交報十種鬼類十種人道十種仙三界諸天發真歸元魔王宮殿崩裂五陰主人色陰區宇受陰區宇想陰區宇行陰區宇識陰區宇諸根互用八識因緣說轉識說銷安逸鬼說上俱楞嚴經卷之五總說佛說此經已趺坐爾時佛放寶塔不退諸菩薩能知五千人退席如是妙法虛妄是為諸佛於世若人散亂心佛道諸佛兩足便說舍利弗道故大通智勝佛道入如來室來座見寶塔品提婆達多品龍女獻珠藥王菩薩上俱法華經總說世主妙嚴品普賢世界毗盧遮那品觀察十方如來名號六品有勝三昧等頌爾時世尊須彌法慧菩薩住法十行品十回向品十地品十一地出現離世間品入法界品入不思議願品上俱華嚴經
